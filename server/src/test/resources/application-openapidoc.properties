# Profile used ONLY to boot the context and export the OpenAPI spec without Supabase.
# In-memory H2 in PostgreSQL mode; Hibernate creates the schema from the entities so the
# context starts. This is never used at runtime (runtime uses Supabase + ddl-auto=validate).
spring.datasource.url=jdbc:h2:mem:vendra;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Dummy resource-server config so the JwtDecoder bean builds (no network until a token is verified).
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost/jwks.json

vendra.cors.allowed-origins=http://localhost:3000
vendra.supabase.url=http://localhost
vendra.supabase.service-role-key=
vendra.supabase.storage-url=http://localhost/storage/v1
vendra.stripe.secret-key=
vendra.stripe.webhook-secret=
