server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: vendra-api
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      # Supabase transaction pooler (6543) does not support prepared statements.
      data-source-properties:
        prepareThreshold: 0
  jpa:
    hibernate:
      # Schema is owned by Supabase migrations. Hibernate ONLY validates — never alters.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: true
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # Asymmetric verification via Supabase JWKS (ES256/RS256).
          jwk-set-uri: ${SUPABASE_JWKS_URI:}
          issuer-uri: ${SUPABASE_JWT_ISSUER:}

vendra:
  jwt:
    audience: ${SUPABASE_JWT_AUDIENCE:authenticated}
    # Legacy HS256 shared secret fallback (used only if jwk-set-uri unreachable / empty).
    hs256-secret: ${SUPABASE_JWT_SECRET:}
  supabase:
    url: ${SUPABASE_URL}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
    storage-url: ${SUPABASE_STORAGE_URL}
    buckets:
      products: ${SUPABASE_BUCKET_PRODUCTS:products}
      shops: ${SUPABASE_BUCKET_SHOPS:shops}
      avatars: ${SUPABASE_BUCKET_AVATARS:avatars}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    connect-refresh-url: ${STRIPE_CONNECT_REFRESH_URL:http://localhost:3000/merchant/onboarding/refresh}
    connect-return-url: ${STRIPE_CONNECT_RETURN_URL:http://localhost:3000/merchant/onboarding/return}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

springdoc:
  swagger-ui:
    path: /docs
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.hibernate.SQL: warn
    com.vendra: debug
