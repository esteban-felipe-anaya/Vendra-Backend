# Vendra — Supabase CLI config. `supabase link --project-ref <ref>` then `supabase db push`.
project_id = "vendra"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

# Buckets (products / shops / avatars) are created by migrations/0010_storage.sql.
# To declare them here instead, use table sections, e.g.:
#   [storage.buckets.products]
#   public = true
[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:3001", "io.vendra.app://login-callback"]
jwt_expiry = 3600
enable_signup = true

# Asymmetric JWT signing (ES256/RS256) is the default for new projects (Oct 2025+).
# Spring verifies via the JWKS endpoint; HS256 shared-secret is accepted as a legacy fallback.
[auth.email]
enable_signup = true
enable_confirmations = false   # dev convenience; enable in production

[realtime]
enabled = true
